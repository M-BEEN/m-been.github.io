name: sync-sitemap

# 루트 sitemap.xml 을 blog-kr 의 사이트맵과 동기화한다.
#
# 왜 인덱스가 아니라 복사본인가:
#   사이트맵 인덱스(하위 sitemap 을 가리키기만 하는 방식)도 표준이지만, 크롤러가 한 단계를
#   더 따라가야 하고 루트 sitemap 만 봐서는 어떤 URL 이 있는지 알 수 없다. blog-kr 사이트맵의
#   <loc> 는 이미 절대 URL(https://m-been.github.io/blog-kr/...)이라 그대로 복사해도 유효하다.
#   그래서 루트에 전체 URL 을 그대로 실어둔다.
#
# 글은 매 거래일 아침 자동 발행되므로 수동 복사는 금방 낡는다. 그래서 이 워크플로가 필요하다.

on:
  schedule:
    # 08:40 KST (= 23:40 UTC 전날). report-service 의 일일 발행(08:00~08:15)과
    # blog-kr Pages 빌드가 끝난 뒤에 돈다.
    - cron: '40 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-sitemap
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: blog-kr 사이트맵 가져오기
        run: |
          # -f: HTTP 에러면 실패(빈 파일로 덮어쓰는 사고 방지)
          curl -sSf https://m-been.github.io/blog-kr/sitemap.xml -o fetched.xml

          # 방어: 정상 사이트맵인지 확인한 뒤에만 교체한다.
          if ! grep -q '<urlset' fetched.xml; then
            echo "::error::urlset 이 없다 — 사이트맵이 아니거나 빌드 중일 수 있다. 기존 파일 유지."
            exit 1
          fi
          count=$(grep -o '<loc>' fetched.xml | wc -l)
          if [ "$count" -lt 5 ]; then
            echo "::error::URL 이 ${count}개뿐이다. 비정상으로 보고 기존 파일을 유지한다."
            exit 1
          fi
          echo "URL ${count}개 확인"
          mv fetched.xml sitemap.xml

      - name: 변경 시 커밋
        run: |
          if git diff --quiet sitemap.xml; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "chore: blog-kr 사이트맵 동기화"
          git push
